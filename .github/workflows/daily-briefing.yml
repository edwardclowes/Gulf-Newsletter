name: Daily Immigration & DHS Briefing

on:
  schedule:
    # 07:00 UTC = 07:00 UK (winter) / 08:00 UK (summer, BST)
    # Adjust the hour to suit your preferred delivery time.
    - cron: "0 5 * * 1-5"   # Weekdays only
    # - cron: "0 7 * * *"   # Uncomment for every day including weekends

  # Lets you trigger a run manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run briefing script
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:     ${{ secrets.GMAIL_APP_PASS }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
        run: node briefing.js
